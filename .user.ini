; PHP Configuration for cPanel
; This file sets PHP directives for the application

; Error handling
display_errors = Off
log_errors = On
error_log = ../error_log

; File uploads
upload_max_filesize = 10M
post_max_size = 10M

; Execution limits
max_execution_time = 300
max_input_time = 300
memory_limit = 128M

; Character encoding
default_charset = "UTF-8"

; Session settings
session.cookie_httponly = 1
session.use_strict_mode = 1

; Security
expose_php = Off

